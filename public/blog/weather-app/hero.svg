<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="630" fill="#0A0A0A"/>

  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1a1a1a" stroke-width="0.5"/>
    </pattern>
    <linearGradient id="fadeBottom" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0A0A0A" stop-opacity="0"/>
      <stop offset="1" stop-color="#0A0A0A" stop-opacity="1"/>
    </linearGradient>
    <linearGradient id="fadeTop" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0A0A0A" stop-opacity="1"/>
      <stop offset="0.3" stop-color="#0A0A0A" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="skyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1a2a4a"/>
      <stop offset="1" stop-color="#0c1220"/>
    </linearGradient>
    <linearGradient id="cacheGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6366f1"/>
      <stop offset="1" stop-color="#818cf8"/>
    </linearGradient>
    <linearGradient id="wsGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#10b981"/>
      <stop offset="1" stop-color="#34d399"/>
    </linearGradient>
    <linearGradient id="doGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f59e0b"/>
      <stop offset="1" stop-color="#fbbf24"/>
    </linearGradient>
    <linearGradient id="reactGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#61dafb"/>
      <stop offset="1" stop-color="#38bdf8"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect width="1200" height="180" fill="url(#fadeTop)"/>
  <rect y="480" width="1200" height="150" fill="url(#fadeBottom)"/>

  <!-- Sky/weather illustration area (left side) -->
  <g transform="translate(80, 160)">
    <!-- Dark sky card -->
    <rect x="0" y="0" width="360" height="300" rx="20" fill="url(#skyGrad)" stroke="#1e3a5f" stroke-width="1"/>

    <!-- Sun/moon -->
    <circle cx="280" cy="70" r="32" fill="#fbbf24" opacity="0.15"/>
    <circle cx="280" cy="70" r="22" fill="#fbbf24" opacity="0.3"/>
    <circle cx="280" cy="70" r="12" fill="#fbbf24" opacity="0.6"/>

    <!-- Cloud 1 -->
    <g opacity="0.4">
      <ellipse cx="120" cy="80" rx="50" ry="20" fill="#334155"/>
      <ellipse cx="100" cy="75" rx="30" ry="18" fill="#334155"/>
      <ellipse cx="145" cy="78" rx="28" ry="16" fill="#334155"/>
    </g>

    <!-- Cloud 2 -->
    <g opacity="0.25">
      <ellipse cx="220" cy="120" rx="40" ry="16" fill="#334155"/>
      <ellipse cx="200" cy="116" rx="25" ry="14" fill="#334155"/>
      <ellipse cx="240" cy="118" rx="22" ry="12" fill="#334155"/>
    </g>

    <!-- Rain drops -->
    <g opacity="0.3" stroke="#60a5fa" stroke-width="1.5" stroke-linecap="round">
      <line x1="90" y1="110" x2="86" y2="130"/>
      <line x1="110" y1="105" x2="106" y2="125"/>
      <line x1="130" y1="108" x2="126" y2="128"/>
      <line x1="150" y1="103" x2="146" y2="123"/>
      <line x1="100" y1="135" x2="96" y2="155"/>
      <line x1="120" y1="132" x2="116" y2="152"/>
      <line x1="140" y1="130" x2="136" y2="150"/>
    </g>

    <!-- Temperature display -->
    <text x="40" y="210" fill="#e5e5e5" font-family="system-ui, -apple-system, sans-serif" font-size="48" font-weight="700">18°</text>
    <text x="145" y="200" fill="#94a3b8" font-family="system-ui, -apple-system, sans-serif" font-size="14">Oslo, Norway</text>
    <text x="145" y="220" fill="#64748b" font-family="system-ui, -apple-system, sans-serif" font-size="12">Partly Cloudy</text>

    <!-- Forecast mini cards -->
    <g transform="translate(30, 245)">
      <rect x="0" y="0" width="56" height="40" rx="8" fill="#1e293b" opacity="0.6"/>
      <text x="28" y="16" text-anchor="middle" fill="#64748b" font-family="system-ui, -apple-system, sans-serif" font-size="9">Mon</text>
      <text x="28" y="32" text-anchor="middle" fill="#94a3b8" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600">15°</text>

      <rect x="64" y="0" width="56" height="40" rx="8" fill="#1e293b" opacity="0.6"/>
      <text x="92" y="16" text-anchor="middle" fill="#64748b" font-family="system-ui, -apple-system, sans-serif" font-size="9">Tue</text>
      <text x="92" y="32" text-anchor="middle" fill="#94a3b8" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600">12°</text>

      <rect x="128" y="0" width="56" height="40" rx="8" fill="#1e293b" opacity="0.6"/>
      <text x="156" y="16" text-anchor="middle" fill="#64748b" font-family="system-ui, -apple-system, sans-serif" font-size="9">Wed</text>
      <text x="156" y="32" text-anchor="middle" fill="#94a3b8" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600">20°</text>

      <rect x="192" y="0" width="56" height="40" rx="8" fill="#1e293b" opacity="0.6"/>
      <text x="220" y="16" text-anchor="middle" fill="#64748b" font-family="system-ui, -apple-system, sans-serif" font-size="9">Thu</text>
      <text x="220" y="32" text-anchor="middle" fill="#94a3b8" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600">17°</text>

      <rect x="256" y="0" width="56" height="40" rx="8" fill="#1e293b" opacity="0.6"/>
      <text x="284" y="16" text-anchor="middle" fill="#64748b" font-family="system-ui, -apple-system, sans-serif" font-size="9">Fri</text>
      <text x="284" y="32" text-anchor="middle" fill="#94a3b8" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600">22°</text>
    </g>
  </g>

  <!-- Architecture diagram (right side) -->
  <g transform="translate(540, 170)">
    <!-- React SPA box -->
    <rect x="0" y="0" width="200" height="60" rx="12" fill="#111111" stroke="#61dafb" stroke-width="1.5" opacity="0.9"/>
    <rect x="0" y="0" width="200" height="60" rx="12" fill="url(#reactGrad)" opacity="0.06"/>
    <circle cx="30" cy="30" r="10" fill="none" stroke="#61dafb" stroke-width="1.5" opacity="0.5"/>
    <ellipse cx="30" cy="30" rx="16" ry="6" fill="none" stroke="#61dafb" stroke-width="0.8" opacity="0.3" transform="rotate(30, 30, 30)"/>
    <ellipse cx="30" cy="30" rx="16" ry="6" fill="none" stroke="#61dafb" stroke-width="0.8" opacity="0.3" transform="rotate(-30, 30, 30)"/>
    <text x="56" y="26" fill="#94a3b8" font-family="system-ui, -apple-system, sans-serif" font-size="10">React + Vite</text>
    <text x="56" y="42" fill="#61dafb" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600">Frontend SPA</text>

    <!-- Arrow down -->
    <line x1="100" y1="60" x2="100" y2="90" stroke="#333" stroke-width="1.5"/>
    <polygon points="95,88 100,98 105,88" fill="#333"/>

    <!-- Cloudflare Worker box -->
    <rect x="0" y="100" width="200" height="60" rx="12" fill="#111111" stroke="#f59e0b" stroke-width="1.5" opacity="0.9"/>
    <rect x="0" y="100" width="200" height="60" rx="12" fill="url(#doGrad)" opacity="0.06"/>
    <text x="24" y="126" fill="#94a3b8" font-family="system-ui, -apple-system, sans-serif" font-size="10">Hono on Workers</text>
    <text x="24" y="146" fill="#fbbf24" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600">API Layer</text>

    <!-- Arrow down -->
    <line x1="100" y1="160" x2="100" y2="190" stroke="#333" stroke-width="1.5"/>
    <polygon points="95,188 100,198 105,188" fill="#333"/>

    <!-- Durable Object box -->
    <rect x="0" y="200" width="200" height="100" rx="12" fill="#111111" stroke="#6366f1" stroke-width="1.5" opacity="0.9"/>
    <rect x="0" y="200" width="200" height="100" rx="12" fill="url(#cacheGrad)" opacity="0.06"/>
    <text x="24" y="226" fill="#818cf8" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600">Durable Object</text>

    <!-- DO concerns list -->
    <text x="24" y="248" fill="#666" font-family="ui-monospace, monospace" font-size="10">cache</text>
    <text x="24" y="264" fill="#666" font-family="ui-monospace, monospace" font-size="10">recent</text>
    <text x="24" y="280" fill="#666" font-family="ui-monospace, monospace" font-size="10">rate-limit</text>
    <text x="110" y="248" fill="#666" font-family="ui-monospace, monospace" font-size="10">websocket</text>

    <!-- Dots separating concerns -->
    <circle cx="80" cy="245" r="1.5" fill="#6366f1" opacity="0.4"/>
    <circle cx="80" cy="261" r="1.5" fill="#6366f1" opacity="0.4"/>
    <circle cx="80" cy="277" r="1.5" fill="#6366f1" opacity="0.4"/>

    <!-- WebSocket arrow (right side, going back up) -->
    <line x1="200" y1="250" x2="240" y2="250" stroke="#10b981" stroke-width="1.5" stroke-dasharray="4,3"/>
    <line x1="240" y1="250" x2="240" y2="30" stroke="#10b981" stroke-width="1.5" stroke-dasharray="4,3"/>
    <line x1="240" y1="30" x2="200" y2="30" stroke="#10b981" stroke-width="1.5" stroke-dasharray="4,3"/>
    <polygon points="204,25 200,30 204,35" fill="#10b981"/>

    <!-- WebSocket label -->
    <text x="248" y="148" fill="#34d399" font-family="ui-monospace, monospace" font-size="9" transform="rotate(90, 248, 148)">WebSocket</text>

    <!-- SWR label on cache arrow -->
    <rect x="270" y="215" width="140" height="50" rx="10" fill="#111111" stroke="#6366f1" stroke-width="1" opacity="0.7"/>
    <text x="340" y="236" text-anchor="middle" fill="#818cf8" font-family="ui-monospace, monospace" font-size="9">stale-while-</text>
    <text x="340" y="252" text-anchor="middle" fill="#818cf8" font-family="ui-monospace, monospace" font-size="9">revalidate</text>

    <!-- External API -->
    <rect x="270" y="100" width="140" height="44" rx="10" fill="#111111" stroke="#333" stroke-width="1"/>
    <text x="340" y="120" text-anchor="middle" fill="#666" font-family="system-ui, -apple-system, sans-serif" font-size="10">Open-Meteo API</text>
    <text x="340" y="136" text-anchor="middle" fill="#444" font-family="system-ui, -apple-system, sans-serif" font-size="9">Weather + Geocoding</text>

    <!-- Arrow from worker to external -->
    <line x1="200" y1="128" x2="270" y2="124" stroke="#333" stroke-width="1" stroke-dasharray="4,3"/>
  </g>

  <!-- Title -->
  <text x="600" y="80" text-anchor="middle" fill="#e5e5e5" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="700" letter-spacing="-0.5">Weather App on Cloudflare's Edge</text>
  <text x="600" y="115" text-anchor="middle" fill="#666" font-family="system-ui, -apple-system, sans-serif" font-size="15">Durable Objects, WebSockets, and animated skies</text>

  <!-- Bottom tech tags -->
  <text x="600" y="520" text-anchor="middle" fill="#333" font-family="ui-monospace, monospace" font-size="13">react  ·  cloudflare workers  ·  durable objects  ·  websocket  ·  tailwind v4</text>

  <!-- Subtle glow effects -->
  <circle cx="260" cy="310" r="180" fill="#1a2a4a" opacity="0.04"/>
  <circle cx="640" cy="300" r="150" fill="#6366f1" opacity="0.03"/>
  <circle cx="880" cy="280" r="100" fill="#f59e0b" opacity="0.03"/>
</svg>
